<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="contato.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>
<body>
    <header>
        <img class="Logo" src="https://s3-sa-east-1.amazonaws.com/projetos-artes/fullsize/2019/02/28/17/Logo-253716_341712_173106804_1653267716.jpg" alt="logo">
        <div class="nav">
            <h1>Contato</h1>
            
        </div>
    </header>

    <main>
        <nav class="back-nav">
            <a href="index.html" class="back-link">← Voltar ao Menu</a>
        </nav>
        <section class="contact-section">
            <div class="contact-container">
                <h2>Finalize seu Pedido</h2>
                <p>Preencha os dados abaixo para entrega</p>
                <div id="order-total" class="order-total-box">
                    <!-- Total será exibido aqui -->
                </div>
            </div>
        </section>
        <form action="envio.html">
            <div class="form-group">
                <label for="name">Nome:</label>
                <input type="text" id="name" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label for="phone">Telefone:</label>
                <input type="tel" id="phone" placeholder="Seu telefone" required>
            </div>
            <div class="form-group">
                <label for="cep">CEP:</label>
                <input type="text" id="cep" placeholder="Seu CEP" required>
            </div>
            <div class="form-group">
                <label for="bairro">Bairro:</label>
                <input type="text" id="bairro" placeholder="Seu bairro" required>
            </div>
            <div class="form-group rua-numero-row">
                <div class="field-group">
                    <label for="rua">Rua:</label>
                    <input type="text" id="rua" placeholder="Sua rua" required>
                </div>
                <div class="field-group small-field">
                    <label for="numero">Número:</label>
                    <input type="text" id="numero" placeholder="Seu número" required>
                </div>
            </div>
            <div class="form-group">
                <label for="complemento">Complemento:</label>
                <input type="text" id="complemento" placeholder="Complemento (opcional)">
            </div>
            <button type="submit" href="envio.html">Enviar Pedido</button>

        </form>
    </main>

    <script>
        // Pegar o parâmetro total da URL
        const urlParams = new URLSearchParams(window.location.search);
        const total = urlParams.get('total');
        if (total) {
            document.getElementById('order-total').innerHTML = `<p><strong>Total do Pedido: R$ ${total}</strong></p>`;
        }
    </script>
</body>
</html>
